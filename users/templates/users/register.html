{% extends "base.html" %}

{% block title %}Sign up - Social Pressure{% endblock %}

{% block content %}
<h1>Sign up</h1>
<form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}
        {{ field.label_tag }}
        {{ field }}
        {{ field.errors }}
    {% endfor %}
    <button type="submit">Create account</button>
</form>
<p>Already have an account? <a href="{% url 'login' %}">Log in</a>.</p>
{% endblock %}

{% extends "base.html" %}

{% block title %}Log in - Social Pressure{% endblock %}

{% block content %}
<h1>Log in</h1>
<form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}
        {{ field.label_tag }}
        {{ field }}
        {{ field.errors }}
    {% endfor %}
    <button type="submit">Log in</button>
</form>
<p>Need an account? <a href="{% url 'register' %}">Sign up</a>.</p>
{% endblock %}

<div class="push-banner is-hidden" data-push-banner data-vapid-public-key="{{ vapid_public_key }}">
    <span class="push-banner__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
            <path d="M15 17H9m9-2V11a6 6 0 0 0-12 0v4l-2 2h16l-2-2Zm-4 4a2 2 0 0 1-4 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </span>
    <p class="push-banner__text" data-push-banner-text>Get a ping when your partners check in.</p>
    <button class="btn btn--primary push-banner__enable" type="button" data-push-banner-enable>Enable</button>
    <button class="push-banner__dismiss" type="button" aria-label="Dismiss" data-push-banner-dismiss>✕</button>
</div>
